<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genius - Cadastro de Chaves</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0d11;
            --sidebar-bg: rgba(255, 255, 255, 0.02);
            --accent-color: #6c5ce7;
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
            --sidebar-width: 260px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0; display: flex; min-height: 100vh;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column;
            position: fixed; height: 100vh;
        }

        .sidebar-header { padding: 30px; border-bottom: 1px solid var(--glass-border); }
        .sidebar-header h2 { font-size: 1.2rem; margin: 0; color: var(--accent-color); letter-spacing: 1px; }

        .nav-menu { flex: 1; padding: 20px 0; list-style: none; margin: 0; }
        .nav-item { padding: 12px 30px; display: flex; align-items: center; gap: 15px; color: var(--text-dim); text-decoration: none; transition: 0.3s; font-size: 0.9rem; }
        .nav-item:hover, .nav-item.active { background: rgba(108, 92, 231, 0.05); color: #fff; border-left: 4px solid var(--accent-color); padding-left: 26px; }

        .nav-footer { padding: 20px; border-top: 1px solid var(--glass-border); }
        .back-main { text-decoration: none; color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; }

        .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 40px; animation: fadeIn 0.6s ease-out; }
        header { margin-bottom: 40px; }
        h1 { font-size: 2.2rem; margin: 0; letter-spacing: -1px; }
        .breadcrumb { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; }

        .form-card { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 20px; padding: 40px; max-width: 700px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; font-size: 0.8rem; color: var(--accent-color); margin-bottom: 8px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; font-family: inherit; }
        
        .btn-submit { width: 100%; padding: 15px; border: none; border-radius: 10px; background: var(--accent-color); color: #000; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .btn-submit:hover { filter: brightness(1.1); box-shadow: 0 0 20px rgba(108, 92, 231, 0.3); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-header">
        <h2>GENIUS Keys</h2>
    </div>
    <ul class="nav-menu">
        <li><a href="portal_sub_chaves.html" class="nav-item">📊 Dashboards</a></li>
        <li><a href="cadastro_chaves.html" class="nav-item active">➕ Cadastros</a></li>
        <li><a href="agentes_ativos.html" class="nav-item">🤖 Agentes</a></li>
        <li><a href="processo_chaves.html" class="nav-item">🧠 Processos</a></li>
        <li><a href="ferramentas_chaves.html" class="nav-item">🛠️ Ferramentas</a></li>
        <li><a href="fractais_chaves.html" class="nav-item">💠 Fractais</a></li>
        <li><a href="banco_dados_chaves.html" class="nav-item">🗄️ Banco de Dados</a></li>
    </ul>
    <div class="nav-footer">
        <a href="../../../3_saida/portal_visual_unidade_agricola.html" class="back-main">← Dashboard Mestre</a>
    </div>
</aside>

<main class="main-content">
    <header>
        <div class="breadcrumb">Submódulo #06 / Operacional</div>
        <h1>Mapeamento de Chaves (Cross-Ref)</h1>
    </header>

    <div class="form-card">
        <form>
            <div class="form-group">
                <label>ID Unívoco Genius</label>
                <input type="text" placeholder="Ex: GNS-TLH-201">
            </div>
            <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label>Sistema de Destino</label>
                    <select>
                        <option>SAP_AGRO</option>
                        <option>TOTVS_RM</option>
                        <option>PROTHEUS</option>
                        <option>REGIN (Gov)</option>
                    </select>
                </div>
                <div>
                    <label>ID no Sistema Externo</label>
                    <input type="text" placeholder="ID Legado / ERP">
                </div>
            </div>
            <div class="form-group">
                <label>Tipo de Ativo Mapeado</label>
                <select>
                    <option>Talhão (Célula)</option>
                    <option>Gleba (Zona)</option>
                    <option>Fazenda (Centro de Lucro)</option>
                    <option>Proprietário (Holding)</option>
                    <option>Ativo Fundiário (Matrícula)</option>
                </select>
            </div>
            <button type="button" class="btn-submit" onclick="alert('Chave enviada para orquestração do Agente Integrador.')">Vincular Chaves</button>
        </form>
    </div>
</main>

</body>
</html>
