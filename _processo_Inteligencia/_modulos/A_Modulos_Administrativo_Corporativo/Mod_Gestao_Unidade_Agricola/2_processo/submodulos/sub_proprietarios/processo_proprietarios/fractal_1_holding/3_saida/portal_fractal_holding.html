<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genius - Fractal Holding</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080a0f;
            --accent-color: #f7b731;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.07);
            --text-main: #e0e0e0;
            --text-dim: #909090;
        }

        @media print {
            body { background: white !important; color: black !important; }
            .back-link, .report-btn { display: none !important; }
            .dashboard { border: 1px solid #ccc !important; background: none !important; box-shadow: none !important; width: 100% !important; max-width: 100% !important; }
            h1 { color: black !important; }
            td, th { border-bottom: 1px solid #eee !important; color: black !important; }
        }

        body {
            background: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .dashboard {
            width: 90%; max-width: 900px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        header {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 40px;
        }

        .back-link {
            text-decoration: none; color: var(--text-dim);
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s;
        }

        .back-link:hover { color: var(--accent-color); }

        h1 { font-size: 2rem; margin: 5px 0; color: #fff; }
        .meta { color: var(--accent-color); font-size: 0.9rem; font-weight: 300; }

        table {
            width: 100%; border-collapse: collapse; margin-top: 20px;
            border-radius: 15px; overflow: hidden;
        }

        th {
            background: rgba(255,255,255,0.05); text-align: left;
            padding: 15px; font-size: 0.9rem; color: var(--text-dim);
            text-transform: uppercase; font-weight: 600;
        }

        td {
            padding: 15px; border-bottom: 1px solid var(--glass-border);
            font-size: 0.95rem;
        }

        tr:hover { background: rgba(255,255,255,0.02); }

        .status-badge {
            padding: 5px 10px; border-radius: 6px; font-size: 0.75rem;
            background: rgba(247, 183, 49, 0.1); color: var(--accent-color);
        }

        .p-bar-bg { width: 100%; background: rgba(255,255,255,0.05); height: 6px; border-radius: 3px; margin-top: 5px; }
        .p-bar-fill { height: 100%; background: var(--accent-color); border-radius: 3px; }

        .footer { margin-top: 40px; font-size: 0.7rem; color: var(--text-dim); text-align: center; }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <div>
            <p class="meta">Genius Fractal #01</p>
            <h1>Gestor de Participação (Holding)</h1>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <button onclick="window.print()" class="report-btn" style="background: rgba(255,255,255,0.1); color: #fff; border: 1px solid var(--glass-border); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-family: 'Outfit', sans-serif;">📄 Gerar Relatório</button>
            <a href="../../../saida_proprietarios/portal_sub_proprietarios.html" class="back-link">← Voltar</a>
        </div>
    </header>

    <table>
        <thead>
            <tr>
                <th>Sócio</th>
                <th>Participação</th>
                <th>Valor Nominal</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Roberto Silva</td>
                <td>
                    60.0%
                    <div class="p-bar-bg"><div class="p-bar-fill" style="width: 60%;"></div></div>
                </td>
                <td>R$ 6.000.000</td>
                <td><span class="status-badge">Assinado</span></td>
            </tr>
            <tr>
                <td>Mariana Silva</td>
                <td>
                    20.0%
                    <div class="p-bar-bg"><div class="p-bar-fill" style="width: 20%;"></div></div>
                </td>
                <td>R$ 2.000.000</td>
                <td><span class="status-badge">Assinado</span></td>
            </tr>
            <tr>
                <td>Invest Rural S.A</td>
                <td>
                    20.0%
                    <div class="p-bar-bg"><div class="p-bar-fill" style="width: 20%;"></div></div>
                </td>
                <td>R$ 2.000.000</td>
                <td><span class="status-badge" style="color: #bbb; background: rgba(255,255,255,0.05);">Em Revisão</span></td>
            </tr>
        </tbody>
    </table>

    <div class="footer">
        © Genius Ecossistema [Fractal Mode Active]
    </div>
</div>

</body>
</html>
