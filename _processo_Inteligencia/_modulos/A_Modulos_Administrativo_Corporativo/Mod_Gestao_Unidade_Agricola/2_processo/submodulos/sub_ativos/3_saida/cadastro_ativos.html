<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genius - Cadastro Ativos Fundiários</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0d11;
            --sidebar-bg: rgba(255, 255, 255, 0.02);
            --accent-color: #ff9f43;
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
            --sidebar-width: 260px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0; display: flex; min-height: 100vh;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column;
            position: fixed; height: 100vh;
        }

        .sidebar-header { padding: 30px; border-bottom: 1px solid var(--glass-border); }
        .sidebar-header h2 { font-size: 1.2rem; margin: 0; color: var(--accent-color); letter-spacing: 1px; }

        .nav-menu { flex: 1; padding: 20px 0; list-style: none; margin: 0; }
        .nav-item { padding: 12px 30px; display: flex; align-items: center; gap: 15px; color: var(--text-dim); text-decoration: none; transition: 0.3s; font-size: 0.9rem; }
        .nav-item:hover, .nav-item.active { background: rgba(255, 159, 67, 0.05); color: #fff; border-left: 4px solid var(--accent-color); padding-left: 26px; }

        .nav-footer { padding: 20px; border-top: 1px solid var(--glass-border); }
        .back-main { text-decoration: none; color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; }

        .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 40px; animation: fadeIn 0.6s ease-out; }
        header { margin-bottom: 40px; }
        h1 { font-size: 2.2rem; margin: 0; letter-spacing: -1px; }
        .breadcrumb { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; }

        .form-card { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 20px; padding: 40px; max-width: 700px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; font-size: 0.8rem; color: var(--accent-color); margin-bottom: 8px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; font-family: inherit; }
        
        .btn-submit { width: 100%; padding: 15px; border: none; border-radius: 10px; background: var(--accent-color); color: #000; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .btn-submit:hover { filter: brightness(1.1); box-shadow: 0 0 20px rgba(255, 159, 67, 0.3); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-header">
        <h2>GENIUS Assets</h2>
    </div>
    <ul class="nav-menu">
        <li><a href="portal_sub_ativos.html" class="nav-item">📊 Dashboards</a></li>
        <li><a href="cadastro_ativos.html" class="nav-item active">➕ Cadastros</a></li>
        <li><a href="agentes_ativos.html" class="nav-item">🤖 Agentes</a></li>
        <li><a href="processo_ativos.html" class="nav-item">🧠 Processos</a></li>
        <li><a href="ferramentas_ativos.html" class="nav-item">🛠️ Ferramentas</a></li>
        <li><a href="fractais_ativos.html" class="nav-item">💠 Fractais</a></li>
        <li><a href="banco_dados_ativos.html" class="nav-item">🗄️ Banco de Dados</a></li>
    </ul>
    <div class="nav-footer">
        <a href="../../../3_saida/portal_visual_unidade_agricola.html" class="back-main">← Dashboard Mestre</a>
    </div>
</aside>

<main class="main-content">
    <header>
        <div class="breadcrumb">Submódulo #05 / Operacional</div>
        <h1>Novo Registro de Ativo Fundiário</h1>
    </header>

    <div class="form-card">
        <form>
            <div class="form-group">
                <label>Categoria do Ativo</label>
                <select>
                    <option>Matrícula Imobiliária</option>
                    <option>CAR (Cadastro Ambiental)</option>
                    <option>ITR / CCIR (Territorial)</option>
                    <option>Outorga de Água</option>
                    <option>Licença de Desmate (Supressão)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Identificação / Número do Título</label>
                <input type="text" id="idAtivo" placeholder="Ex: Matrícula 12.345, Recibo CAR...">
            </div>
            <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label>Área Documental (ha)</label>
                    <input type="number" step="0.01" placeholder="0.00">
                </div>
                <div>
                    <label>Data de Vencimento / Prova</label>
                    <input type="date">
                </div>
            </div>
            <div class="form-group">
                <label>Fazenda Vínculo</label>
                <select id="vinculoFazenda">
                    <option value="">-- Selecione a Fazenda Detentora --</option>
                    <option value="FZD-001">Fazenda Machadinho</option>
                    <option value="FZD-002">Fazenda Recanto</option>
                    <option value="FZD-003">Fazenda Santa Fé</option>
                </select>
            </div>
            <button type="button" class="btn-submit" onclick="validarAtivo()">Registrar Ativo</button>
        </form>

        <!-- Zona de Comunicação do Agente -->
        <div id="agentReport" style="margin-top: 30px; padding: 20px; background: rgba(255,159,67,0.05); border-left: 4px solid var(--accent-color); display: none; animation: slideIn 0.3s ease-out;">
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 10px;">
                <span style="font-size: 1.5rem;">📚</span>
                <strong style="color: var(--accent-color); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Relatório de Auditoria - Agente Bibliotecário</strong>
            </div>
            <p id="reportContent" style="font-size: 0.85rem; color: var(--text-main); margin: 0; line-height: 1.6;"></p>
        </div>
    </div>
</main>

<script>
    function enviarParaCentroNotificacoes(agente, conexoes) {
        const logs = JSON.parse(localStorage.getItem('genius_audit_logs') || '[]');
        logs.push({
            agente: agente,
            conexoes: conexoes,
            data: new Date().toLocaleString()
        });
        localStorage.setItem('genius_audit_logs', JSON.stringify(logs));
    }

    function validarAtivo() {
        const fazenda = document.getElementById('vinculoFazenda').value;
        const idAtv = document.getElementById('idAtivo').value;
        const report = document.getElementById('agentReport');
        const content = document.getElementById('reportContent');
        
        if(!fazenda) {
            const msg = 'Falha de Custódia Documental: Tentativa de arquivamento de ativo sem matrícula mestre.';
            report.style.display = 'block';
            content.innerHTML = `
                <b>STATUS:</b> REJEITADO (Falha de Custódia)<br>
                <b>OCORRÊNCIA:</b> ${msg}<br>
                <b>TIMESTAMP:</b> ${new Date().toLocaleString()}<br>
                <b>RECOMENDAÇÃO:</b> Vincule o documento à matrícula oficial da fazenda detentora para custódia segura.
            `;

            // Envio Global
            enviarParaCentroNotificacoes('AGENTE BIBLIOTECÁRIO (#05)', msg);

            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            return;
        }

        report.style.display = 'none';
        alert('✅ SUCESSO: Ativo [' + idAtv + '] validado e vinculado à ' + fazenda + '. Documento enviado para custódia do Agente Bibliotecário.');
    }
</script>

</body>
</html>
