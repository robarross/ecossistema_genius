<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genius - Agrimensor GPS (Fractal #03)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0d11;
            --accent-color: #0fbcf9;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
        }

        body {
            background: #0b0d11;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0; padding: 0;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 60px 20px; }

        header { margin-bottom: 50px; }
        .back-link { text-decoration: none; color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; }
        h1 { font-size: 2.2rem; margin: 10px 0; }
        .fractal-id { color: var(--accent-color); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }

        .content-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            margin-top: 30px;
            position: relative;
        }

        .gps-grid {
            height: 300px; width: 100%; 
            background: radial-gradient(circle, #2d3436 0%, #0b0d11 100%);
            border-radius: 15px; margin: 30px 0; border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        .gps-grid::before {
            content: ''; position: absolute; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(15, 188, 249, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(15, 188, 249, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .gps-target {
            width: 20px; height: 20px; border: 2px solid var(--accent-color); border-radius: 50%;
            position: relative; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }

        .data-panel { display: flex; justify-content: space-around; gap: 20px; margin-top: 30px; }
        .data-item { text-align: center; }
        .data-item b { font-size: 1.2rem; color: #fff; display: block; }
        .data-item span { font-size: 0.75rem; color: var(--accent-color); text-transform: uppercase; }

        .footer { margin-top: 60px; text-align: center; font-size: 0.7rem; color: var(--text-dim); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="./portal_sub_talhoes.html" class="back-link">← Voltar</a>
        <div class="fractal-id">Fractal #03 - Talhões</div>
        <h1>Agrimensura e Coordenadas de Precisão</h1>
    </header>

    <div class="content-card">
        <h3>Telemetria de Célula Produtiva</h3>
        <p style="color: var(--text-dim);">Sincronia milimétrica de limites para automação agrícola.</p>
        
        <div class="gps-grid">
            <div class="gps-target"></div>
        </div>

        <div class="data-panel">
            <div class="data-item">
                <span>Precisão Atual</span>
                <b>± 0.05 m</b>
            </div>
            <div class="data-item">
                <span>Satélites Ativos</span>
                <b>12 (RTK Fixed)</b>
            </div>
            <div class="data-item">
                <span>Status de Antena</span>
                <b style="color: #00ff88;">ONLINE</b>
            </div>
        </div>
    </div>

    <div class="footer">
        © Genius GPS Command - Automação em Chão de Terra
    </div>
</div>

</body>
</html>
