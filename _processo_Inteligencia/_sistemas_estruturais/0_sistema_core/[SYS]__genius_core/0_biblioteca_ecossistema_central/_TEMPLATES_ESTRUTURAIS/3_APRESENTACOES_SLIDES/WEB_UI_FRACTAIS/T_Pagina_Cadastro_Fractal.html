<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - {{NOME_DO_MODULO}}</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .form-container { background: #1e293b; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 400px; }
        .field { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8-px; color: #94a3b8; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn-save { background: #38bdf8; color: #0f172a; width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Cadastro de {{ENTIDADE}}</h2>
        <div class="field">
            <label>Nome / Descrição</label>
            <input type="text" placeholder="Ex: Lote Soja A1">
        </div>
        <div class="field">
            <label>Categoria</label>
            <select>
                <option>Selecione...</option>
                <option>Semente</option>
                <option>Fertilizante</option>
                <option>Equipamento</option>
            </select>
        </div>
        <div class="field">
            <label>Valor / Quantidade</label>
            <input type="number">
        </div>
        <button class="btn-save">Salvar no Banco Genius</button>
    </div>
</body>
</html>
